<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="splitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Header -->
  <text x="960" y="120" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" letter-spacing="6" fill="#ff2d55">⚠ LIVE</text>
  <text x="960" y="175" text-anchor="middle" font-family="'Courier New', monospace" font-size="44" font-weight="900" letter-spacing="4" fill="url(#splitGrad)" filter="url(#textGlow)">LIVE DEMO</text>

  <!-- Demo 1: Password Crack -->
  <rect x="200" y="310" width="725" height="450" rx="8" fill="#12121a" stroke="#ff2d55" stroke-width="1.5"/>
  <rect x="200" y="310" width="725" height="4" fill="#ff2d55"/>
  <text x="562.5" y="365" text-anchor="middle" font-family="'Courier New', monospace" font-size="40" font-weight="700" fill="#ff2d55">🔓 CRACK A PASSWORD</text>
  <text x="562.5" y="420" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28" fill="#e0e0e8">Use hashcat to crack a weak password hash</text>
  <text x="562.5" y="460" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" fill="#8888a0">Show: hash input → wordlist attack → cracked!</text>
  <text x="562.5" y="660" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" fill="#8888a0">Time: ~A few seconds</text>
  <text x="540" y="550" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" font-weight="500" fill="#26ff00">$ hashcat -a 0 -m 0 hash.txt rockyou.txt</text>
  <text x="575" y="582" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" font-weight="500" fill="#26ff00">5f4dcc3b5aa765d61d8327deb882cf99:password</text>
  <rect x="260" y="510" width="600" height="100" rx="8" fill="#080a08" opacity="0.3"/>
  <rect x="412.5" y="685" width="300" height="50" rx="8" fill="#ff2d55" opacity="0.15"/>
  <text x="562.5" y="715" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" fill="#ff2d55">HIGH IMPACT</text>

  <!-- Demo 5: XSS -->
  <rect x="990" y="310" width="725" height="450" rx="8" fill="#12121a" stroke="#0077ff" stroke-width="1.5"/>
  <rect x="990" y="310" width="725" height="4" fill="#0077ff"/>
  <text x="1352.5" y="365" text-anchor="middle" font-family="'Courier New', monospace" font-size="40" font-weight="700" fill="#0077ff">⚡ XSS ATTACK</text>
  <text x="1352.5" y="410" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28" fill="#e0e0e8">Inject a script into the search page</text>
  <text x="1352.5" y="450" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" fill="#8888a0">Show: search field → inject script → alert pops up</text>
  <text x="1352.5" y="650" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" fill="#8888a0">Time: ~30 seconds</text>
  <rect x="1100" y="470" width="500" height="50" rx="8" fill="#080a08" opacity="0.3"/>
  <text x="1352.5" y="500" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" font-weight="500" fill="#26ff00">'script alert("1"); /script'</text>
  <text x="1352.5" y="550" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" font-weight="500" fill="#26ff00">A page at Nemesis.Nemesis Says: 1</text>

  <rect x="1252.5" y="675" width="200" height="50" rx="8" fill="#0077ff" opacity="0.15"/>
  <text x="1352.5" y="707.5" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" fill="#0077ff">VISUAL</text>

  <!-- Corner accents -->
  <polyline points="30,30 30,80 80,80" fill="none" stroke="#ff2d55" stroke-width="2" opacity="0.4"/>
  <polyline points="1890,30 1890,80 1840,80" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>
</svg>