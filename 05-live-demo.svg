<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="splitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Header -->
  <text x="960" y="120" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" letter-spacing="6" fill="#ff2d55">⚠ LIVE</text>
  <text x="960" y="175" text-anchor="middle" font-family="'Courier New', monospace" font-size="44" font-weight="900" letter-spacing="4" fill="url(#splitGrad)" filter="url(#textGlow)">LIVE DEMO</text>

  <!-- Demo 1: Password Crack -->
  <rect x="200" y="260" width="725" height="450" rx="8" fill="#12121a" stroke="#ff2d55" stroke-width="1.5"/>
  <rect x="200" y="260" width="725" height="4" fill="#ff2d55"/>
  <text x="562.5" y="315" text-anchor="middle" font-family="'Courier New', monospace" font-size="40" font-weight="700" fill="#ff2d55">🔓 CRACK A PASSWORD</text>
  <text x="562.5" y="360" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28" fill="#e0e0e8">Use hashcat to crack a weak password hash</text>
  <text x="562.5" y="400" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" fill="#8888a0">Show: hash input → wordlist attack → cracked!</text>
  <text x="562.5" y="600" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" fill="#8888a0">Time: ~30 seconds</text>
  <text x="540" y="490" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" font-weight="500" fill="#26ff00">$ hashcat -a 0 -m 0 hash.txt rockyou.txt</text>
  <text x="575" y="522" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" font-weight="500" fill="#26ff00">5f4dcc3b5aa765d61d8327deb882cf99:password</text>
  <rect x="260" y="450" width="600" height="100" rx="8" fill="#080a08" opacity="0.3"/>
  <rect x="412.5" y="625" width="300" height="50" rx="8" fill="#ff2d55" opacity="0.15"/>
  <text x="562.5" y="655" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" fill="#ff2d55">HIGH IMPACT</text>

  <!-- Demo 5: XSS -->
  <rect x="990" y="260" width="725" height="450" rx="8" fill="#12121a" stroke="#0077ff" stroke-width="1.5"/>
  <rect x="990" y="260" width="725" height="4" fill="#0077ff"/>
  <text x="1352.5" y="315" text-anchor="middle" font-family="'Courier New', monospace" font-size="40" font-weight="700" fill="#0077ff">⚡ XSS ATTACK</text>
  <text x="1352.5" y="360" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28" fill="#e0e0e8">Inject a script into the search page</text>
  <text x="1352.5" y="400" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" fill="#8888a0">Show: search field → inject script → alert pops up</text>
  <text x="1352.5" y="600" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" fill="#8888a0">Time: ~30 seconds</text>
  <rect x="1235" y="625" width="200" height="50" rx="8" fill="#0077ff" opacity="0.15"/>
  <text x="1352.5" y="655" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" fill="#0077ff">VISUAL</text>

  <!-- Demo tips -->
  <rect x="200" y="750" width="1520" height="250" rx="8" fill="#12121a" stroke="#ffd700" stroke-width="1"/>
  <text x="960" y="800" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#ffd700">💡 DEMO TIPS</text>

  <text x="250" y="850" font-family="'Segoe UI', sans-serif" font-size="17" fill="#e0e0e8">1. <tspan fill="#ff2d55">Practice first</tspan> — run through it 2-3 times so you know it works</text>
  <text x="250" y="885" font-family="'Segoe UI', sans-serif" font-size="17" fill="#e0e0e8">2. <tspan fill="#a855f7">Explain as you go</tspan> — talk the audience through what's happening on screen</text>
  <text x="250" y="920" font-family="'Segoe UI', sans-serif" font-size="17" fill="#e0e0e8">3. <tspan fill="#00d4ff">Have a backup</tspan> — if the live demo fails, have screenshots ready</text>
  <text x="250" y="955" font-family="'Segoe UI', sans-serif" font-size="17" fill="#e0e0e8">4. <tspan fill="#ffd700">Keep it short</tspan> — 1-2 minutes max per demo, don't let it drag</text>
  <text x="250" y="985" font-family="'Segoe UI', sans-serif" font-size="17" fill="#e0e0e8">5. <tspan fill="#ff2d55">End with the impact</tspan> — "This is why weak passwords are dangerous"</text>

  <!-- Corner accents -->
  <polyline points="30,30 30,80 80,80" fill="none" stroke="#ff2d55" stroke-width="2" opacity="0.4"/>
  <polyline points="1890,30 1890,80 1840,80" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>
</svg>