<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="splitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Header -->
  <text x="960" y="80" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" letter-spacing="6" fill="#8888a0">BY THE NUMBERS</text>
  <text x="960" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="44" font-weight="900" letter-spacing="4" fill="url(#splitGrad)" filter="url(#textGlow)">OUR STATS</text>
  <text x="960" y="170" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#8888a0">Fill in your numbers from the Nemesis leaderboard</text>

  <!-- Big stat cards — Row 1 -->
  <rect x="100" y="210" width="400" height="220" rx="8" fill="#12121a" stroke="#ff2d55" stroke-width="1.5"/>
  <text x="300" y="300" text-anchor="middle" font-family="'Courier New', monospace" font-size="64" font-weight="900" fill="#ff2d55" filter="url(#glow)">[??]</text>
  <text x="300" y="350" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#ff2d55">SCENARIOS</text>
  <text x="300" y="380" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">completed as a team</text>
  <text x="300" y="415" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#8888a0" stroke-dasharray="4,4">↑ Replace [??] with your number</text>

  <rect x="540" y="210" width="400" height="220" rx="8" fill="#12121a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="740" y="300" text-anchor="middle" font-family="'Courier New', monospace" font-size="64" font-weight="900" fill="#a855f7" filter="url(#glow)">[??]</text>
  <text x="740" y="350" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#a855f7">TOTAL XP</text>
  <text x="740" y="380" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">earned across all activities</text>
  <text x="740" y="415" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#8888a0">↑ Check the leaderboard</text>

  <rect x="980" y="210" width="400" height="220" rx="8" fill="#12121a" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="1180" y="300" text-anchor="middle" font-family="'Courier New', monospace" font-size="64" font-weight="900" fill="#00d4ff" filter="url(#glow)">[??]</text>
  <text x="1180" y="350" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#00d4ff">TOOLS USED</text>
  <text x="1180" y="380" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">different security tools</text>
  <text x="1180" y="415" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#8888a0">↑ Count from your activity log</text>

  <rect x="1420" y="210" width="400" height="220" rx="8" fill="#12121a" stroke="#ffd700" stroke-width="1.5"/>
  <text x="1620" y="300" text-anchor="middle" font-family="'Courier New', monospace" font-size="64" font-weight="900" fill="#ffd700" filter="url(#glow)">[??]</text>
  <text x="1620" y="350" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#ffd700">AI AGENTS</text>
  <text x="1620" y="380" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">built and tested</text>
  <text x="1620" y="415" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#8888a0">↑ Check agent builder</text>

  <!-- Row 2: More stats -->
  <rect x="200" y="470" width="480" height="180" rx="8" fill="#12121a" stroke="#2a2a3a"/>
  <text x="440" y="530" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#ff2d55">⚡ FASTEST SCENARIO TIME</text>
  <text x="440" y="580" text-anchor="middle" font-family="'Courier New', monospace" font-size="40" font-weight="900" fill="#e0e0e8">[? min ?? sec]</text>
  <text x="440" y="620" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">[Which scenario was it?]</text>

  <rect x="720" y="470" width="480" height="180" rx="8" fill="#12121a" stroke="#2a2a3a"/>
  <text x="960" y="530" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#a855f7">🧠 BEST ASSESSMENT SCORE</text>
  <text x="960" y="580" text-anchor="middle" font-family="'Courier New', monospace" font-size="40" font-weight="900" fill="#e0e0e8">[??%]</text>
  <text x="960" y="620" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">[Which day?]</text>

  <rect x="1240" y="470" width="480" height="180" rx="8" fill="#12121a" stroke="#2a2a3a"/>
  <text x="1480" y="530" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#00d4ff">🔓 PASSWORDS CRACKED</text>
  <text x="1480" y="580" text-anchor="middle" font-family="'Courier New', monospace" font-size="40" font-weight="900" fill="#e0e0e8">[??]</text>
  <text x="1480" y="620" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">[How fast was the fastest?]</text>

  <!-- Team comparison -->
  <text x="960" y="720" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" letter-spacing="3" fill="#a855f7">TEAM BATTLE RESULTS:</text>

  <rect x="200" y="750" width="700" height="100" rx="8" fill="#12121a" stroke="#ff2d55" stroke-width="1"/>
  <text x="550" y="790" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" fill="#ff2d55">SHADOWFOX: [????] XP</text>
  <text x="550" y="825" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">[How many members?] attackers</text>

  <rect x="1020" y="750" width="700" height="100" rx="8" fill="#12121a" stroke="#00d4ff" stroke-width="1"/>
  <text x="1370" y="790" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" fill="#00d4ff">IRONSHIELD: [????] XP</text>
  <text x="1370" y="825" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">[How many members?] defenders</text>

  <!-- Winner -->
  <rect x="600" y="890" width="720" height="80" rx="8" fill="#ffd700" opacity="0.08" stroke="#ffd700" stroke-width="1.5"/>
  <text x="960" y="935" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" font-weight="900" fill="#ffd700">🏆 WINNER: [TEAM NAME]</text>
  <text x="960" y="960" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#8888a0">Replace with the winning team!</text>

  <!-- Corner accents -->
  <polyline points="30,30 30,80 80,80" fill="none" stroke="#ff2d55" stroke-width="2" opacity="0.4"/>
  <polyline points="1890,30 1890,80 1840,80" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>
</svg>