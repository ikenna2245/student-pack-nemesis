<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="splitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Header -->
  <text x="960" y="80" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" letter-spacing="6" fill="#8888a0">INTRODUCING</text>
  <text x="960" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="44" font-weight="900" letter-spacing="4" fill="url(#splitGrad)" filter="url(#textGlow)">ABOUT US</text>

  <!-- Team member cards (placeholders for students to fill) -->
