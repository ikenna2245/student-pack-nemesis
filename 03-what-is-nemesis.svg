<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="splitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Header -->
  <text x="960" y="80" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" letter-spacing="6" fill="#8888a0">THE PLATFORM</text>
  <text x="960" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="44" font-weight="900" letter-spacing="4" fill="url(#splitGrad)" filter="url(#textGlow)">WHAT IS NEMESIS?</text>

  <!-- Description -->
  <text x="960" y="190" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" fill="#e0e0e8">A gamified cybersecurity training platform built by BT</text>

  <!-- The split concept -->
  <rect x="100" y="230" width="820" height="280" rx="8" fill="#12121a" stroke="#ff2d55" stroke-width="1.5"/>
  <rect x="100" y="230" width="820" height="4" fill="#ff2d55"/>
  <text x="510" y="290" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="900" fill="#ff2d55">SHADOWFOX</text>
  <text x="510" y="320" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#ff2d55" opacity="0.7">RED TEAM — OFFENCE</text>
  <text x="510" y="370" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#e0e0e8">Attack systems</text>
  <text x="510" y="400" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#e0e0e8">Find vulnerabilities</text>
  <text x="510" y="430" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#e0e0e8">Exploit weaknesses</text>
  <text x="510" y="460" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#e0e0e8">Break in before the bad guys do</text>
  <text x="510" y="495" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#8888a0">Like penetration testers and ethical hackers</text>

  <rect x="1000" y="230" width="820" height="280" rx="8" fill="#12121a" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="1000" y="230" width="820" height="4" fill="#00d4ff"/>
  <text x="1410" y="290" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="900" fill="#00d4ff">IRONSHIELD</text>
  <text x="1410" y="320" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#00d4ff" opacity="0.7">BLUE TEAM — DEFENCE</text>
  <text x="1410" y="370" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#e0e0e8">Defend systems</text>
  <text x="1410" y="400" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#e0e0e8">Detect threats</text>
  <text x="1410" y="430" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#e0e0e8">Monitor traffic</text>
  <text x="1410" y="460" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#e0e0e8">Keep attackers out</text>
  <text x="1410" y="495" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#8888a0">Like SOC analysts and security engineers</text>

  <!-- What we did section -->
  <text x="960" y="580" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" letter-spacing="3" fill="#a855f7">WHAT WE USED IT FOR:</text>

  <rect x="160" y="610" width="380" height="100" rx="6" fill="#12121a" stroke="#2a2a3a"/>
  <text x="350" y="650" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#ff2d55">🎯 SCENARIOS</text>
  <text x="350" y="680" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">Timed security challenges</text>
  <text x="350" y="700" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">at Bronze, Silver, Gold levels</text>

  <rect x="580" y="610" width="380" height="100" rx="6" fill="#12121a" stroke="#2a2a3a"/>
  <text x="770" y="650" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#a855f7">🔧 TOOLS</text>
  <text x="770" y="680" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">Real security tools like</text>
  <text x="770" y="700" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">nmap, hashcat, sqlmap</text>

  <rect x="1000" y="610" width="380" height="100" rx="6" fill="#12121a" stroke="#2a2a3a"/>
  <text x="1190" y="650" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#00d4ff">🤖 AI AGENTS</text>
  <text x="1190" y="680" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">Built our own AI security</text>
  <text x="1190" y="700" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">assistants with tool access</text>

  <rect x="1420" y="610" width="380" height="100" rx="6" fill="#12121a" stroke="#2a2a3a"/>
  <text x="1610" y="650" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#ffd700">📚 LEARNING</text>
  <text x="1610" y="680" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">Modules, quizzes, and</text>
  <text x="1610" y="700" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8888a0">daily assessments</text>

  <!-- Student note -->
  <rect x="300" y="760" width="1320" height="240" rx="8" fill="#a855f7" opacity="0.06" stroke="#a855f7" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="960" y="810" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#a855f7">📝 YOUR NOTES — EXPLAIN TO THE AUDIENCE:</text>
  <text x="340" y="860" font-family="'Segoe UI', sans-serif" font-size="17" fill="#8888a0">• What was Nemesis and why did BT build it?</text>
  <text x="340" y="895" font-family="'Segoe UI', sans-serif" font-size="17" fill="#8888a0">• What's the difference between red team and blue team?</text>
  <text x="340" y="930" font-family="'Segoe UI', sans-serif" font-size="17" fill="#8888a0">• Why do companies need both attackers AND defenders?</text>
  <text x="340" y="965" font-family="'Segoe UI', sans-serif" font-size="17" fill="#8888a0">• Which team were you on and why?</text>

  <!-- Corner accents -->
  <polyline points="30,30 30,80 80,80" fill="none" stroke="#ff2d55" stroke-width="2" opacity="0.4"/>
  <polyline points="1890,30 1890,80 1840,80" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>
</svg>