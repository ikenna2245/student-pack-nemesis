<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="splitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Header -->
  <text x="960" y="80" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" letter-spacing="6" fill="#8888a0">REFLECTIONS</text>
  <text x="960" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="44" font-weight="900" letter-spacing="4" fill="url(#splitGrad)" filter="url(#textGlow)">WHAT SURPRISED US</text>
  <text x="960" y="175" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="20" fill="#8888a0">The things we didn't expect to learn this week</text>

  <!-- Surprise cards — each team member fills one -->
  <rect x="100" y="220" width="820" height="300" rx="8" fill="#12121a" stroke="#ff2d55" stroke-width="1"/>
  <text x="510" y="270" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#ff2d55">😮 SURPRISE #1</text>
  <rect x="140" y="290" width="740" height="200" rx="4" fill="#0a0a0f" stroke="#2a2a3a" stroke-dasharray="4,4"/>
  <text x="510" y="340" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#8888a0">"I found out how useful AI can actually be"</text>
  <text x="510" y="380" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="16" fill="#8888a0">[Why was it unexpected?]</text>
  <text x="510" y="420" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#a855f7">— George Garfield</text>
 

  <rect x="1000" y="220" width="820" height="300" rx="8" fill="#12121a" stroke="#00d4ff" stroke-width="1"/>
  <text x="1410" y="270" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#00d4ff">😮 SURPRISE #2</text>
  <rect x="1040" y="290" width="740" height="200" rx="4" fill="#0a0a0f" stroke="#2a2a3a" stroke-dasharray="4,4"/>
  <text x="1410" y="340" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#8888a0">"How often people can be the deciding factor."</text>
  <text x="1410" y="380" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="16" fill="#8888a0">[Why was it unexpected?]</text>
  <text x="1410" y="420" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#a855f7">— Callum Guilder</text>
  

  <rect x="100" y="560" width="820" height="300" rx="8" fill="#12121a" stroke="#a855f7" stroke-width="1"/>
  <text x="510" y="610" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#a855f7">😮 SURPRISE #3</text>
  <rect x="140" y="630" width="740" height="200" rx="4" fill="#0a0a0f" stroke="#2a2a3a" stroke-dasharray="4,4"/>
  <text x="510" y="680" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#8888a0">"How easy it actually is..."</text>
  <text x="510" y="720" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="16" fill="#8888a0">[Why was it unexpected?]</text>
  <text x="510" y="760" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#a855f7">— Alex Mihali</text>
 

  <rect x="1000" y="560" width="820" height="300" rx="8" fill="#12121a" stroke="#ffd700" stroke-width="1"/>
  <text x="1410" y="610" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#ffd700">😮 SURPRISE #4</text>
  <rect x="1040" y="630" width="740" height="200" rx="4" fill="#0a0a0f" stroke="#2a2a3a" stroke-dasharray="4,4"/>
  <text x="1410" y="680" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#8888a0"></text>
  <text x="1410" y="720" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="16" fill="#8888a0">"The amount of Jobs in Cybersecurity"</text>
  <text x="1410" y="760" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#a855f7">— Reimund Okuchaba</text>

  <!-- Corner accents -->
  <polyline points="30,30 30,80 80,80" fill="none" stroke="#ff2d55" stroke-width="2" opacity="0.4"/>
  <polyline points="1890,30 1890,80 1840,80" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>
</svg>